<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERRA // Seismic Activity Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="preload" href="https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg" as="image">
    <style>
        :root {
            --bg: #030307;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.4);
            
            --glass-bg: rgba(10, 10, 18, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.6);
            
            --color-minor: #00e5ff;
            --color-light: #00e676;
            --color-moderate: #ffb300;
            --color-severe: #ff1744;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text-primary);
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        #c {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }
         /* UI Overlays */
        .overlay {
            position: fixed;
            z-index: 10;
            pointer-events: none;
        }

        /* Header UI */
        header {
            top: 2rem;
            left: 2rem;
            pointer-events: auto;
            animation: slideDown 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
         .brand-container {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-mark {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--color-severe);
            box-shadow: 0 0 12px var(--color-severe);
            animation: pulse-glow 2s ease-in-out infinite;
        }
         .title {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            line-height: 1.1;
            text-transform: uppercase;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.15);
        }

        .sub {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            color: var(--text-muted);
            margin-top: 0.3rem;
        }
