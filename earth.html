<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERRA // Interactive Globe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400;700&family=Playfair+Display:wght@400;800&display=swap"
        rel="stylesheet">
    <!-- Preload the main texture so browser fetches it ASAP -->
    <link rel="preload" href="https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg" as="image"><style>
        :root {
            --bg: #000;
            --text: #f0f0f0;
            --muted: rgba(240, 240, 240, 0.4);
            --accent: #4fc3f7;
            --warm: #ffb74d;
        }
* {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }body {
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            font-family: 'JetBrains Mono', monospace;
            -webkit-font-smoothing: antialiased;
        } #c {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }#ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 3rem 4rem;
        }header {
            animation: fadeD 1.2s cubic-bezier(.16, 1, .3, 1) forwards;
            opacity: 0;
            transform: translateY(-20px);
        }.title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(4rem, 10vw, 8rem);
            font-weight: 800;
            letter-spacing: -.05em;
            line-height: .85;
            margin-bottom: .75rem;
            text-shadow: 0 0 60px rgba(79, 195, 247, .12);
        }.sub {
            font-size: .75rem;
            text-transform: uppercase;
            letter-spacing: .25em;
            color: var(--muted);
            max-width: 320px;
            line-height: 1.8;
        }.panel {
            align-self: flex-start;
            background: rgba(10, 10, 20, .6);
            -webkit-backdrop-filter: blur(16px);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(79, 195, 247, .08);
            border-radius: 12px;
            padding: 1.25rem 1.75rem;
            animation: fadeU 1.2s cubic-bezier(.16, 1, .3, 1) .4s forwards;
            opacity: 0;
            transform: translateY(20px);
            pointer-events: auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .4);
        }.ph {
            font-size: .6rem;
            text-transform: uppercase;
            letter-spacing: .3em;
            color: var(--accent);
            margin-bottom: 1rem;
            padding-bottom: .6rem;
            border-bottom: 1px solid rgba(79, 195, 247, .1);
            display: flex;
            align-items: center;
            gap: .5rem;
        }.dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #4caf50;
            box-shadow: 0 0 8px rgba(76, 175, 80, .6);
            animation: pulse 2s ease-in-out infinite;
        }

        .dr {
            display: flex;
            justify-content: space-between;
            margin-bottom: .6rem;
            font-size: .7rem;
            min-width: 260px;
        }.dr:last-child {
            margin-bottom: 0;
        }

        .dl {
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .1em;
        }
.dv {
            color: var(--accent);
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .dv.w {
            color: var(--warm);
        }
 .hint {
            position: absolute;
            bottom: 3rem;
            right: 4rem;
            font-size: .65rem;
            text-transform: uppercase;
            letter-spacing: .25em;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 1rem;
            animation: fadeI 2s ease 1.2s forwards;
            opacity: 0;
        }
 .hl {
            width: 40px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--muted));
        }@keyframes fadeD {
            to {
                opacity: 1;
                transform: translateY(0)
            } @keyframes fadeU {
            to {
                opacity: 1;
                transform: translateY(0)
            }
        }     @keyframes fadeI {
            to {
                opacity: 1
            }
        } @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }50% {
                opacity: .4
            }
        }
        #eq-panel {
            position: fixed;
            top: 3rem;
            right: 4rem;
            width: 320px;
            max-height: calc(100vh - 12rem);
            background: rgba(10, 10, 20, .6);
            -webkit-backdrop-filter: blur(16px);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(79, 195, 247, .08);
            border-radius: 12px;
            padding: 1.25rem 1.75rem;
            animation: fadeU 1.2s cubic-bezier(.16, 1, .3, 1) .5s forwards;
            opacity: 0;
            transform: translateY(20px);
            pointer-events: auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .4);
            display: flex;
            flex-direction: column;
            z-index: 15;
        }
        .eq-list {
            overflow-y: auto;
            margin-top: 0.5rem;
            padding-right: 0.5rem;
            max-height: calc(100vh - 16rem);
        }
        /* Custom scrollbar */
        .eq-list::-webkit-scrollbar {
            width: 4px;
        }
        .eq-list::-webkit-scrollbar-track {
            background: rgba(240, 240, 240, 0.05);
        }
        .eq-list::-webkit-scrollbar-thumb {
            background: rgba(79, 195, 247, 0.3);
            border-radius: 2px;
        }
        .eq-item {
            padding: 0.75rem;
            border-radius: 8px;
            border: 1px solid rgba(240, 240, 240, 0.03);
            background: rgba(240, 240, 240, 0.02);
            margin-bottom: 0.6rem;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(.16, 1, .3, 1);
        }
        .eq-item:hover {
            background: rgba(79, 195, 247, 0.08);
            border-color: rgba(79, 195, 247, 0.2);
            transform: translateX(-4px);
        }
        .eq-item.active {
            background: rgba(79, 195, 247, 0.15);
            border-color: rgba(79, 195, 247, 0.4);
            box-shadow: 0 0 12px rgba(79, 195, 247, 0.15);
        }
        .eq-loc {
            font-size: 0.75rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.25rem;
        }
        .eq-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            color: var(--muted);
        }
        .eq-mag {
            color: var(--warm);
            font-weight: 700;
        }
        .eq-depth {
            color: #ccc;
        }
        #tooltip {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 100;
            opacity: 0;
            transform: translate(-50%, -120%) scale(0.95);
            transition: opacity 0.15s ease, transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(10, 10, 20, 0.85);
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(79, 195, 247, 0.2);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: #fff;
            font-size: 0.7rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            min-width: 180px;
        }
        #tooltip.visible {
            opacity: 1;
            transform: translate(-50%, -120%) scale(1);
        }
        .tt-title {
            font-weight: 700;
            margin-bottom: 0.35rem;
            border-bottom: 1px solid rgba(79, 195, 247, 0.15);
            padding-bottom: 0.25rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .tt-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.2rem;
        }
        .tt-label {
            color: var(--muted);
            margin-right: 1rem;
        }
        .tt-value {
            font-variant-numeric: tabular-nums;
            font-weight: 700;
        }

        @media(max-width:1024px) {
            #eq-panel {
                display: none; /* Hide sidebar list on smaller screens to prevent overlap, but keep interaction */
            }
        }

        @media(max-width:768px) {
            #ui {
                padding: 2rem;
                flex-direction: column;
                justify-content: flex-start;
                gap: 1.5rem;
                overflow-y: auto;
                pointer-events: auto;
            }
            .panel {
                min-width: 100%;
                transform: none !important;
                animation: none !important;
                opacity: 1 !important;
            }
            .hint {
                position: static;
                margin-top: 1rem;
                justify-content: center;
                animation: none !important;
                opacity: 1 !important;
            }
        }
    </style>
</head>

<body>
    <canvas id="c"></canvas>
    
    <div id="tooltip">
        <div class="tt-title" id="tt-loc">Tokyo, Japan</div>
        <div class="tt-row"><span class="tt-label">Magnitude</span><span class="tt-value" id="tt-mag" style="color:var(--warm);">6.2</span></div>
        <div class="tt-row"><span class="tt-label">Depth</span><span class="tt-value" id="tt-depth">30 km</span></div>
        <div class="tt-row"><span class="tt-label">Coordinates</span><span class="tt-value" id="tt-coords">35.6°N, 139.7°E</span></div>
    </div>

    <div id="ui">
        <header>
            <h1 class="title">TERRA</h1>
            <p class="sub">Photorealistic Earth Visualization<br>Interactive Orbital View</p>
        </header>

        <div class="panel">
            <div class="ph">
                <div class="dot"></div><span>Live Telemetry</span>
            </div>
            <div class="dr"><span class="dl">Latitude</span><span class="dv" id="d-lat">0.000°</span></div>
            <div class="dr"><span class="dl">Longitude</span><span class="dv" id="d-lon">0.000°</span></div>
            <div class="dr"><span class="dl">Altitude</span><span class="dv w" id="d-alt">0 km</span></div>
            <div class="dr"><span class="dl">Rotation</span><span class="dv" id="d-rot">0.000°/s</span></div>
            <div class="dr"><span class="dl">Solar Angle</span><span class="dv w" id="d-sun">0.0°</span></div>
        </div>

        <div id="eq-panel">
            <div class="ph">
                <div class="dot" style="background:#ffb74d; box-shadow: 0 0 8px rgba(255, 183, 77, .6);"></div><span>Seismic Activity</span>
            </div>
            <div class="eq-list" id="eq-list-container">
                <!-- Populated dynamically -->
            </div>
        </div>

        <div class="hint">
            <div class="hl"></div><span>Drag to Orbit · Scroll to Zoom</span>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        (function () {
            // ── Renderer (use the existing canvas) ──
            const canvas = document.getElementById('c');
            const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.1;
            renderer.outputEncoding = THREE.sRGBEncoding;
 const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1500);
            camera.position.set(0, 4, 26);
 const ctrl = new THREE.OrbitControls(camera, canvas);
            ctrl.enableDamping = true;
            ctrl.dampingFactor = 0.04;
            ctrl.enablePan = false;
            ctrl.minDistance = 14;
            ctrl.maxDistance = 45;
            ctrl.rotateSpeed = 0.4;
            ctrl.zoomSpeed = 0.6;
            ctrl.autoRotate = true;
            ctrl.autoRotateSpeed = 0.35;
// ── Stars (lightweight) ──
            const STAR_COUNT = 4000;
            const sp = new Float32Array(STAR_COUNT * 3);
            for (let i = 0; i < STAR_COUNT * 3; i += 3) {
                const r = 300 + Math.random() * 500;
                const th = Math.random() * Math.PI * 2;
                const ph = Math.acos(2 * Math.random() - 1);
                sp[i] = r * Math.sin(ph) * Math.cos(th);
                sp[i + 1] = r * Math.sin(ph) * Math.sin(th);
                sp[i + 2] = r * Math.cos(ph);
            }const sg = new THREE.BufferGeometry();
            sg.setAttribute('position', new THREE.BufferAttribute(sp, 3));
            scene.add(new THREE.Points(sg, new THREE.PointsMaterial({
                color: 0xffffff, size: 0.8, sizeAttenuation: true, transparent: true, opacity: 0.85
            })));

            // ── Earth ──
            const R = 10;
            const earthGeo = new THREE.SphereGeometry(R, 64, 64);
// Start with a dark blue placeholder so the globe is visible instantly
            const earthMat = new THREE.MeshPhongMaterial({
                color: 0x1a3a5c,
                shininess: 25,
                specular: new THREE.Color(0x333333),
            });            const earth = new THREE.Mesh(earthGeo, earthMat);
            earth.rotation.z = 23.5 * Math.PI / 180;
            scene.add(earth);
            // Load textures progressively (main texture first, extras after)
            const tl = new THREE.TextureLoader();

            // 1) Main color – applied as soon as it arrives
            tl.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg', tex => {
                earthMat.map = tex;
                earthMat.color.set(0xffffff);
                earthMat.needsUpdate = true;
            });

            // 2) Bump – adds terrain depth
            tl.load('https://unpkg.com/three-globe/example/img/earth-topology.png', tex => {
                earthMat.bumpMap = tex;
                earthMat.bumpScale = 0.08;
                earthMat.needsUpdate = true;
            });

            // 3) Specular map – shiny oceans
            tl.load('https://unpkg.com/three-globe/example/img/earth-water.png', tex => {
                earthMat.specularMap = tex;
                earthMat.shininess = 40;
                earthMat.specular.set(0x555555);
                earthMat.needsUpdate = true;
            });
            // ── Clouds ──
            const cloudMat = new THREE.MeshPhongMaterial({
                transparent: true, opacity: 0,
                blending: THREE.AdditiveBlending,
                depthWrite: false, shininess: 0,
            });
            const clouds = new THREE.Mesh(
                new THREE.SphereGeometry(R + 0.12, 48, 48), cloudMat
            );
            earth.add(clouds);

            tl.load('https://unpkg.com/three-globe/example/img/earth-clouds.png', tex => {
                cloudMat.map = tex;
                cloudMat.opacity = 0.3;
                cloudMat.needsUpdate = true;
            });

            // ── Atmosphere glow (simple back-side Fresnel) ──
            const atmosMat = new THREE.ShaderMaterial({
                vertexShader: `
                varying vec3 vNorm;
                varying vec3 vWorldPos;
                void main(){
                    vNorm = normalize(normalMatrix * normal);
                    vWorldPos = (modelMatrix * vec4(position,1.0)).xyz;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
                }`,
                fragmentShader: `
                varying vec3 vNorm;
                varying vec3 vWorldPos;
                void main(){
                    vec3 vd = normalize(cameraPosition - vWorldPos);
                    float f = pow(1.0 - dot(vd, vNorm), 3.0);
                    gl_FragColor = vec4(0.25, 0.55, 1.0, f * 0.55);
                }`,
                transparent: true, side: THREE.BackSide,
                depthWrite: false, blending: THREE.AdditiveBlending,
            });
            const atmos = new THREE.Mesh(
                new THREE.SphereGeometry(R + 0.5, 48, 48), atmosMat
            );
            scene.add(atmos);

            // ── Lighting ──
            scene.add(new THREE.AmbientLight(0xffffff, 0.12));
            const sun = new THREE.DirectionalLight(0xfff5e6, 1.6);
            sun.position.set(50, 20, 30);
            scene.add(sun);
            const fill = new THREE.DirectionalLight(0x3366ff, 0.12);
            fill.position.set(-50, -20, -30);
            scene.add(fill);

            // ── Earthquake Data & Markers ──
            const earthquakes = [
                { name: "Valdivia, Chile", lat: -38.2, lng: -73.0, magnitude: 9.5, depth: 33 },
                { name: "Prince William Sound, Alaska", lat: 61.0, lng: -147.7, magnitude: 9.2, depth: 25 },
                { name: "Sumatra, Indonesia", lat: 3.3, lng: 95.8, magnitude: 9.1, depth: 30 },
                { name: "Tohoku, Japan", lat: 38.3, lng: 142.4, magnitude: 9.0, depth: 24 },
                { name: "Kamchatka, Russia", lat: 52.7, lng: 160.1, magnitude: 9.0, depth: 21 },
                { name: "Bangalore, India", lat: 12.97, lng: 77.59, magnitude: 5.6, depth: 40 },
                { name: "Sydney, Australia", lat: -33.86, lng: 151.20, magnitude: 4.8, depth: 20 },
                { name: "San Francisco, USA", lat: 37.77, lng: -122.41, magnitude: 7.1, depth: 10 }
            ];

            function latLngToVector3(lat, lng, radius) {
                const phi = (90 - lat) * Math.PI / 180;
                const theta = (lng + 180) * Math.PI / 180;
                const x = -(radius * Math.sin(phi) * Math.sin(theta));
                const y = radius * Math.cos(phi);
                const z = radius * Math.sin(phi) * Math.cos(theta);
                return new THREE.Vector3(x, y, z);
            }

            const spikeMeshes = [];
            const haloMeshes = [];
            const markersGroup = new THREE.Group();
            earth.add(markersGroup);

            // Flat ring geometry for pulsing ripple effect
            const haloGeo = new THREE.RingGeometry(0.1, 0.4, 16);

            earthquakes.forEach((eq, idx) => {
                // Determine color based on depth: red for shallow, orange for medium, yellow for deep
                let color = 0xffcc00; // Deep (Yellow)
                if (eq.depth < 20) {
                    color = 0xff3b30; // Shallow (Red)
                } else if (eq.depth < 50) {
                    color = 0xff9500; // Medium (Orange)
                }

                // Determine spike height based on magnitude
                const height = (eq.magnitude - 4) * 0.5;

                // Spike geometry (shifted so base is at 0,0,0 locally)
                const spikeGeo = new THREE.CylinderGeometry(0.01, 0.06, height, 8);
                spikeGeo.translate(0, height / 2, 0);

                const spikeMat = new THREE.MeshPhongMaterial({
                    color: color,
                    emissive: color,
                    emissiveIntensity: 0.8,
                    shininess: 30
                });

                const spike = new THREE.Mesh(spikeGeo, spikeMat);
                const pos = latLngToVector3(eq.lat, eq.lng, R);
                spike.position.copy(pos);

                // Align spike direction outwards from sphere surface normal
                const dir = pos.clone().normalize();
                spike.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
                spike.userData = { index: idx, name: eq.name, mag: eq.magnitude, depth: eq.depth };
                markersGroup.add(spike);
                spikeMeshes.push(spike);

                // Pulsing Halo at the base
                const haloMat = new THREE.MeshBasicMaterial({
                    color: color,
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: 0.8,
                    depthWrite: false
                });
                const halo = new THREE.Mesh(haloGeo, haloMat);
                halo.position.copy(pos.clone().multiplyScalar(1.005)); // Avoid z-fighting
                halo.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), dir);
                markersGroup.add(halo);
                haloMeshes.push({ mesh: halo, time: Math.random() * Math.PI });
            });

            // Populate list items in Sidebar
            const eqListContainer = document.getElementById('eq-list-container');
            earthquakes.forEach((eq, idx) => {
                const item = document.createElement('div');
                item.className = 'eq-item';
                item.id = `eq-item-${idx}`;
                item.innerHTML = `
                    <div class="eq-loc">${eq.name}</div>
                    <div class="eq-meta">
                        <span class="eq-mag">M ${eq.magnitude.toFixed(1)}</span>
                        <span class="eq-depth">${eq.depth} km depth</span>
                    </div>
                `;
                item.addEventListener('click', () => {
                    selectEarthquake(idx);
                });
                eqListContainer.appendChild(item);
            });

            // Tracking and Fly-To State
            let trackingIndex = -1;
            let isTracking = false;

            function selectEarthquake(idx) {
                document.querySelectorAll('.eq-item').forEach(el => el.classList.remove('active'));
                const item = document.getElementById(`eq-item-${idx}`);
                if (item) {
                    item.classList.add('active');
                    item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
                trackingIndex = idx;
                isTracking = true;
                ctrl.autoRotate = false;
            }

            // Raycaster Hover & Mouse state
            const mouse = new THREE.Vector2(-999, -999);
            const raycaster = new THREE.Raycaster();
            let hoveredIndex = -1;
            let clientX = 0, clientY = 0;

            const tooltip = document.getElementById('tooltip');
            const ttLoc = document.getElementById('tt-loc');
            const ttMag = document.getElementById('tt-mag');
            const ttDepth = document.getElementById('tt-depth');
            const ttCoords = document.getElementById('tt-coords');

            window.addEventListener('mousemove', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                clientX = e.clientX;
                clientY = e.clientY;
            });

            window.addEventListener('click', (e) => {
                if (e.target.closest('#ui') || e.target.closest('#tooltip')) return;

                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(spikeMeshes);
                if (intersects.length > 0) {
                    const idx = intersects[0].object.userData.index;
                    selectEarthquake(idx);
                }
            });

            function highlightSpike(idx) {
                const s = spikeMeshes[idx];
                if (s) {
                    s.scale.set(1.5, 1.5, 1.5);
                    s.material.emissiveIntensity = 2.0;
                }
            }

            function resetSpikeHighlight(idx) {
                const s = spikeMeshes[idx];
                if (s) {
                    s.scale.set(1, 1, 1);
                    s.material.emissiveIntensity = 0.8;
                }
            }

            function showTooltip(eq) {
                ttLoc.textContent = eq.name;
                ttMag.textContent = eq.magnitude.toFixed(1);
                ttDepth.textContent = eq.depth + ' km';
                ttCoords.textContent = `${Math.abs(eq.lat).toFixed(1)}°${eq.lat >= 0 ? 'N' : 'S'}, ${Math.abs(eq.lng).toFixed(1)}°${eq.lng >= 0 ? 'E' : 'W'}`;
                tooltip.classList.add('visible');
            }

            function hideTooltip() {
                tooltip.classList.remove('visible');
            }

            function updateTooltipPosition() {
                tooltip.style.left = clientX + 'px';
                tooltip.style.top = clientY + 'px';
            }

            // ── UI refs ──
            const dLat = document.getElementById('d-lat');
            const dLon = document.getElementById('d-lon');
            const dAlt = document.getElementById('d-alt');
            const dRot = document.getElementById('d-rot');
            const dSun = document.getElementById('d-sun');

            // Auto-rotate pause/resume on interaction
            let arTimeout;
            ctrl.addEventListener('start', () => { 
                ctrl.autoRotate = false;
                isTracking = false; // Stop camera tracking if user manual orbits
                document.querySelectorAll('.eq-item').forEach(el => el.classList.remove('active'));
            });
            ctrl.addEventListener('end', () => {
                clearTimeout(arTimeout);
                arTimeout = setTimeout(() => { 
                    if (!isTracking) {
                        ctrl.autoRotate = true; 
                    }
                }, 4000);
            });

            // ── Animate ──
            let lastY = 0, frame = 0;
            function tick() {
                requestAnimationFrame(tick);
                earth.rotation.y += 0.0008;
                clouds.rotation.y += 0.0004;
                atmos.rotation.copy(earth.rotation);

                // Slowly orbit the sun direction
                const t = performance.now() * 0.0001;
                sun.position.set(Math.cos(t) * 50, 20, Math.sin(t) * 50);

                // Pulsing halos ripple animation
                haloMeshes.forEach(item => {
                    item.time += 0.02;
                    const progress = (item.time % Math.PI) / Math.PI; // 0 to 1
                    const scale = 1 + progress * 2.5; // Scale from 1 to 3.5
                    item.mesh.scale.set(scale, scale, 1);
                    item.mesh.material.opacity = (1 - progress) * 0.8;
                });

                // Camera Fly-To & Lock-On tracking
                if (isTracking && trackingIndex !== -1) {
                    const targetWorldPos = new THREE.Vector3();
                    spikeMeshes[trackingIndex].getWorldPosition(targetWorldPos);
                    const currentDist = camera.position.length();
                    const targetCamPos = targetWorldPos.clone().normalize().multiplyScalar(currentDist);
                    camera.position.lerp(targetCamPos, 0.05);
                }

                // Raycast hover detection
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(spikeMeshes);
                if (intersects.length > 0) {
                    const idx = intersects[0].object.userData.index;
                    if (hoveredIndex !== idx) {
                        if (hoveredIndex !== -1) resetSpikeHighlight(hoveredIndex);
                        hoveredIndex = idx;
                        highlightSpike(hoveredIndex);
                        showTooltip(earthquakes[hoveredIndex]);
                    }
                    updateTooltipPosition();
                } else {
                    if (hoveredIndex !== -1) {
                        resetSpikeHighlight(hoveredIndex);
                        hoveredIndex = -1;
                        hideTooltip();
                    }
                }

                ctrl.update();
                // Update UI every 6 frames to save CPU
                if (++frame % 6 === 0) {
                    const d = camera.position.length();
                    dLat.textContent = (Math.asin(camera.position.y / d) * 57.2958).toFixed(3) + '°';
                    dLon.textContent = (Math.atan2(camera.position.x, camera.position.z) * 57.2958).toFixed(3) + '°';
                    dAlt.textContent = ((d - R) * 637 | 0) + ' km';
                    dRot.textContent = Math.abs(earth.rotation.y - lastY).toFixed(4) + '°/f';
                    lastY = earth.rotation.y;
                    dSun.textContent = (Math.atan2(sun.position.z, sun.position.x) * 57.2958).toFixed(1) + '°';
                }
                renderer.render(scene, camera);
            }

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            tick();
        })();
    </script>
</body>

</html>
