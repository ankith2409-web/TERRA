!DOCTYPE html>
<html lang="en">

<head><
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERRA // Interactive Globe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400;700&family=Playfair+Display:wght@400;800&display=swap"
        rel="stylesheet">
    <!-- Preload the main texture so browser fetches it ASAP -->
    <link rel="preload" href="https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg" as="image"><style>
        :root {
            --bg: #000;
            --text: #f0f0f0;
            --muted: rgba(240, 240, 240, 0.4);
            --accent: #4fc3f7;
            --warm: #ffb74d;
        }
* {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }body {
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            font-family: 'JetBrains Mono', monospace;
            -webkit-font-smoothing: antialiased;
        } #c {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }#ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 3rem 4rem;
        }header {
            animation: fadeD 1.2s cubic-bezier(.16, 1, .3, 1) forwards;
            opacity: 0;
            transform: translateY(-20px);
        }.title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(4rem, 10vw, 8rem);
            font-weight: 800;
            letter-spacing: -.05em;
            line-height: .85;
            margin-bottom: .75rem;
            text-shadow: 0 0 60px rgba(79, 195, 247, .12);
        }.sub {
            font-size: .75rem;
            text-transform: uppercase;
            letter-spacing: .25em;
            color: var(--muted);
            max-width: 320px;
            line-height: 1.8;
        }.panel {
            align-self: flex-start;
            background: rgba(10, 10, 20, .6);
            -webkit-backdrop-filter: blur(16px);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(79, 195, 247, .08);
            border-radius: 12px;
            padding: 1.25rem 1.75rem;
            animation: fadeU 1.2s cubic-bezier(.16, 1, .3, 1) .4s forwards;
            opacity: 0;
            transform: translateY(20px);
            pointer-events: auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .4);
        }.ph {
            font-size: .6rem;
            text-transform: uppercase;
            letter-spacing: .3em;
            color: var(--accent);
            margin-bottom: 1rem;
            padding-bottom: .6rem;
            border-bottom: 1px solid rgba(79, 195, 247, .1);
            display: flex;
            align-items: center;
            gap: .5rem;
        }.dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #4caf50;
            box-shadow: 0 0 8px rgba(76, 175, 80, .6);
            animation: pulse 2s ease-in-out infinite;
        }

        .dr {
            display: flex;
            justify-content: space-between;
            margin-bottom: .6rem;
            font-size: .7rem;
            min-width: 260px;
        }.dr:last-child {
            margin-bottom: 0;
        }

        .dl {
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .1em;
        }
.dv {
            color: var(--accent);
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .dv.w {
            color: var(--warm);
        }
 .hint {
            position: absolute;
            bottom: 3rem;
            right: 4rem;
            font-size: .65rem;
            text-transform: uppercase;
            letter-spacing: .25em;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 1rem;
            animation: fadeI 2s ease 1.2s forwards;
            opacity: 0;
        }
 .hl {
            width: 40px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--muted));
        }@keyframes fadeD {
            to {
                opacity: 1;
                transform: translateY(0)
            } @keyframes fadeU {
            to {
                opacity: 1;
                transform: translateY(0)
            }
        }     @keyframes fadeI {
            to {
                opacity: 1
            }
        } @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }50% {
                opacity: .4
            }
        }
        @media(max-width:768px) {
            #ui {
                padding: 2rem
            }
            .panel {
                min-width: 100%
            }
            .hint {
                bottom: 2rem;
                right: 2rem
            }
        }
    </style>
</head>

<body>
    <canvas id="c"></canvas>
    <div id="ui">
        <header>
            <h1 class="title">TERRA</h1>
            <p class="sub">Photorealistic Earth Visualization<br>Interactive Orbital View</p>
        </header>       <div class="panel">
            <div class="ph">
                <div class="dot"></div><span>Live Telemetry</span>
            </div>
            <div class="dr"><span class="dl">Latitude</span><span class="dv" id="d-lat">0.000°</span></div>
            <div class="dr"><span class="dl">Longitude</span><span class="dv" id="d-lon">0.000°</span></div>
            <div class="dr"><span class="dl">Altitude</span><span class="dv w" id="d-alt">0 km</span></div>
            <div class="dr"><span class="dl">Rotation</span><span class="dv" id="d-rot">0.000°/s</span></div>
            <div class="dr"><span class="dl">Solar Angle</span><span class="dv w" id="d-sun">0.0°</span></div>
        </div>
        <div class="hint">
            <div class="hl"></div><span>Drag to Orbit · Scroll to Zoom</span>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        (function () {
            // ── Renderer (use the existing canvas) ──
            const canvas = document.getElementById('c');
            const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.1;
            renderer.outputEncoding = THREE.sRGBEncoding;
 const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1500);
            camera.position.set(0, 4, 26);
 const ctrl = new THREE.OrbitControls(camera, canvas);
            ctrl.enableDamping = true;
            ctrl.dampingFactor = 0.04;
            ctrl.enablePan = false;
            ctrl.minDistance = 14;
            ctrl.maxDistance = 45;
            ctrl.rotateSpeed = 0.4;
            ctrl.zoomSpeed = 0.6;
            ctrl.autoRotate = true;
            ctrl.autoRotateSpeed = 0.35;
// ── Stars (lightweight) ──
            const STAR_COUNT = 4000;
            const sp = new Float32Array(STAR_COUNT * 3);
            for (let i = 0; i < STAR_COUNT * 3; i += 3) {
                const r = 300 + Math.random() * 500;
                const th = Math.random() * Math.PI * 2;
                const ph = Math.acos(2 * Math.random() - 1);
                sp[i] = r * Math.sin(ph) * Math.cos(th);
                sp[i + 1] = r * Math.sin(ph) * Math.sin(th);
                sp[i + 2] = r * Math.cos(ph);
            }const sg = new THREE.BufferGeometry();
            sg.setAttribute('position', new THREE.BufferAttribute(sp, 3));
            scene.add(new THREE.Points(sg, new THREE.PointsMaterial({
                color: 0xffffff, size: 0.8, sizeAttenuation: true, transparent: true, opacity: 0.85
            })));

            // ── Earth ──
            const R = 10;
            const earthGeo = new THREE.SphereGeometry(R, 64, 64);
// Start with a dark blue placeholder so the globe is visible instantly
            const earthMat = new THREE.MeshPhongMaterial({
                color: 0x1a3a5c,
                shininess: 25,
                specular: new THREE.Color(0x333333),
            });            const earth = new THREE.Mesh(earthGeo, earthMat);
            earth.rotation.z = 23.5 * Math.PI / 180;
            scene.add(earth);
            // Load textures progressively (main texture first, extras after)
            const tl = new THREE.TextureLoader();
