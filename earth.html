!DOCTYPE html>
<html lang="en">

<head><
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERRA // Interactive Globe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400;700&family=Playfair+Display:wght@400;800&display=swap"
        rel="stylesheet">
    <!-- Preload the main texture so browser fetches it ASAP -->
    <link rel="preload" href="https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg" as="image"><style>
        :root {
            --bg: #000;
            --text: #f0f0f0;
            --muted: rgba(240, 240, 240, 0.4);
            --accent: #4fc3f7;
            --warm: #ffb74d;
        }
* {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }body {
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            font-family: 'JetBrains Mono', monospace;
            -webkit-font-smoothing: antialiased;
        } #c {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }#ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 3rem 4rem;
        }header {
            animation: fadeD 1.2s cubic-bezier(.16, 1, .3, 1) forwards;
            opacity: 0;
            transform: translateY(-20px);
        }.title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(4rem, 10vw, 8rem);
            font-weight: 800;
            letter-spacing: -.05em;
            line-height: .85;
            margin-bottom: .75rem;
            text-shadow: 0 0 60px rgba(79, 195, 247, .12);
        }.sub {
            font-size: .75rem;
            text-transform: uppercase;
            letter-spacing: .25em;
            color: var(--muted);
            max-width: 320px;
            line-height: 1.8;
        }.panel {
            align-self: flex-start;
            background: rgba(10, 10, 20, .6);
            -webkit-backdrop-filter: blur(16px);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(79, 195, 247, .08);
            border-radius: 12px;
            padding: 1.25rem 1.75rem;
            animation: fadeU 1.2s cubic-bezier(.16, 1, .3, 1) .4s forwards;
            opacity: 0;
            transform: translateY(20px);
            pointer-events: auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .4);
        }.ph {
            font-size: .6rem;
            text-transform: uppercase;
            letter-spacing: .3em;
            color: var(--accent);
            margin-bottom: 1rem;
            padding-bottom: .6rem;
            border-bottom: 1px solid rgba(79, 195, 247, .1);
            display: flex;
            align-items: center;
            gap: .5rem;
        }.dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #4caf50;
            box-shadow: 0 0 8px rgba(76, 175, 80, .6);
            animation: pulse 2s ease-in-out infinite;
        }

        .dr {
            display: flex;
            justify-content: space-between;
            margin-bottom: .6rem;
            font-size: .7rem;
            min-width: 260px;
        }.dr:last-child {
            margin-bottom: 0;
        }

        .dl {
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .1em;
        }
