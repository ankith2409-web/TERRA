        :root {
            --bg: #000;
            --text: #f0f0f0;
            --muted: rgba(240, 240, 240, 0.4);
            --accent: #4fc3f7;
            --warm: #ffb74d;
        }
* {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }body {
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            font-family: 'JetBrains Mono', monospace;
            -webkit-font-smoothing: antialiased;
        } #c {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }#ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 3rem 4rem;
        }header {
            animation: fadeD 1.2s cubic-bezier(.16, 1, .3, 1) forwards;
            opacity: 0;
            transform: translateY(-20px);
        }.title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(4rem, 10vw, 8rem);
            font-weight: 800;
            letter-spacing: -.05em;
            line-height: .85;
            margin-bottom: .75rem;
            text-shadow: 0 0 60px rgba(79, 195, 247, .12);
        }.sub {
            font-size: .75rem;
            text-transform: uppercase;
            letter-spacing: .25em;
            color: var(--muted);
            max-width: 320px;
            line-height: 1.8;
        }
